    security_opt: ["seccomp:unconfined"]
    ports:
      - "2001:2001/udp"
      - "17777:17777/udp"
      - "19999:19999/tcp"
    volumes:
      - arma_serverdata:/serverdata
      - arma_saves_ipc_ruha:/root/.local/share/ArmaReforger
      - D:/Longbow/scenarios/Testing/ipc_ruha.json:/config/server.json:ro
    env_file: .env

  ds-ipc-kunar:
    build: .
    container_name: ds-ipc-kunar
    profiles: ["ipc-kunar"]
    restart: on-failure
    cpuset: "0-7,16-23"
