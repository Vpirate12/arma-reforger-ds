services:

  # ── Management ──────────────────────────────────────────────────────────────

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  scenario-manager:
    build: ../scenario-manager
    container_name: scenario-manager
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - D:/Longbow/scenarios/Testing:/scenarios
    env_file: .env
    environment:
      SCENARIOS_PATH: /scenarios
      HTTPS_ONLY: "true"
    depends_on:
      - portainer

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file: .env
    depends_on:
      - scenario-manager

  # ── IPC PVE servers ─────────────────────────────────────────────────────────
  # cpuset pins to CCD0 on Ryzen 9 7950X (cores 0-7 + SMT siblings 16-23).
  # cpu_shares 2048 = 2x default weight; gives DS priority over other containers.
  # seccomp:unconfined required for SteamCMD's networking stack on Docker Desktop.

  ds-ipc-everon:
    build: .
    container_name: ds-ipc-everon
    profiles: ["ipc-everon"]
    restart: on-failure
    cpuset: "0-7,16-23"
    cpu_shares: 2048
    security_opt: ["seccomp:unconfined"]
    ports:
      - "2001:2001/udp"
      - "17777:17777/udp"
      - "19999:19999/tcp"
    volumes:
      - arma_serverdata:/serverdata
      - arma_saves_ipc_everon:/root/.local/share/ArmaReforger
      - D:/Longbow/scenarios/Testing/ipc_everon.json:/config/server.json:ro
    env_file: .env

  ds-ipc-ruha:
    build: .
    container_name: ds-ipc-ruha
    profiles: ["ipc-ruha"]
    restart: on-failure
    cpuset: "0-7,16-23"
